services:
  relay:
    build: .
    restart: unless-stopped
    # env_file passe les valeurs telles quelles (pas d'interpolation $ → un mot
    # de passe contenant '$' est préservé).
    env_file:
      - .env
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
