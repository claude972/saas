services:
  relay:
    build: .
    restart: unless-stopped
    # env_file passe les valeurs telles quelles (un mot de passe avec '$' doit
    # être échappé en '$$' dans le .env).
    env_file:
      - .env
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - relay
    # Port 80 = challenge ACME Let's Encrypt ; 8443 = relais en HTTPS.
    # On NE touche PAS au 443 (déjà pris par Tailscale).
    ports:
      - "80:80"
      - "8443:8443"
    environment:
      RELAY_DOMAIN: ${RELAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
